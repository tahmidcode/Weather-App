<!DOCTYPE html>

<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Document</title>

    <link rel="stylesheet" href="./bootstrap-icons.css">

    <link rel="stylesheet" href="./bootstrap.css">

    <script src="./src/weather.js"></script>
    <style>
        body{
            background: linear-gradient(180deg,#0f2027,#203a43,#2c5364);
            min-height: 100vh;
            color: white;
        }
        #signInForm{
            height: 300px;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 9999;
            background-color: rgba(47, 47, 48, 0.199);
            padding: 20px;
                backdrop-filter: blur(5px);
                box-shadow: 0 0 20px rgba(170, 141, 141, 0.1);
                -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
        }
        #dialog-box{
            height: 200px;
            width: 400px;
            background-color: rgba(128, 128, 216, 0.253);
            backdrop-filter: blur(5px);
            box-shadow: 0 0 20px rgba(170, 141, 141, 0.1);
            z-index: 9999;
            -webkit-backdrop-filter: blur(20px);
        }
        .progress-bar {
        transition: width 0.5s ease-in-out;
        }
        #box1{
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 18px;
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>

<body class="container-fluid text-light" onload="LoadWeatherData('Delhi')">
    <div class="position-absolute top-50 start-50 translate-middle  rounded rounded-4 p-4 d-none" id="dialog-box">
        <button class="btn-close position-absolute top-0 end-0 m-2" id="closeDialog"></button>
        <h1 class="bi bi-share-fill text-center mt-3"> Share to </h1>
        <div class="d-flex justify-content-around align-items-center">
                    <div><i class="bi bi-google fs-3"></i></div>
                     <div><i class="bi bi-apple fs-3"></i></div>
                    <div><i class="bi bi-facebook fs-3"></i></div>
        </div>

    </div>
        <form class="d-none" id="signInForm">
            <button type="button" class="btn-close position-absolute top-0 end-0 m-2" id="close2"></button>
            <div class="form-group mt-4">
              <label for="exampleInputEmail1">Email address</label>
              <input type="email" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp" placeholder="Enter email">
              <small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
            </div>
            <div class="form-group">
              <label for="exampleInputPassword1">Password</label>
              <input type="password" class="form-control" id="exampleInputPassword1" placeholder="Password">
            </div>
            <div class="form-check">
              <input type="checkbox" class="form-check-input" id="exampleCheck1">
              <label class="form-check-label" for="exampleCheck1">Check me out</label>
            </div>
            <button type="submit" class="btn btn-primary">Sign in</button>
        </form>
     <header class="mt-2 p-2 d-flex justify-content-between align-items-center">

         <div>

            <span class="bi bi-cloud-drizzle fs-3 fw-bold"> Weather App </span>

         </div>

         <div>

            <div class="input-group" style="width: 500px;">

                <button onclick="SearchClick()" class="bi bi-search btn btn-secondary"></button>

                <input type="text" id="txtCity"  placeholder="Your city name" class="form-control">

            </div>

         </div>

         <div>

            <button class="btn btn-secondary bi bi-person" id="account"></button>

            <button class="btn btn-secondary mx-2" id="heart"><i class="bi bi-heart"></i></button>
            <button class="btn btn-secondary mx-2  d-none" id="red-heart"><i class="bi bi-heart-fill text-danger"></i></button>

            <button class="btn btn-secondary mx-2 bi bi-share-fill"  id="share"></button>

         </div>

     </header>

     <section class="row mt-4 p-4">

         <div class="col-9">

            <div class="rounded rounded-4 p-5" style="height: 350px;" id="box1">

                <div class="d-flex justify-content-between align-items-center">

                    <div>

                        <div class="fs-1 fw-bold" id="lblCity"></div>

                        <div class="fs-6"> Friday, 13 February 2026 </div>

                    </div>

                    <div>

                        <div class="rounded rounded-pill bg-light text-dark p-2 text-primary"> <span class="bi bi-geo-alt text-primary"></span> Current Location </div>

                    </div>

                </div>

                <div class="mt-2 row p-4">

                    <div class="col-4">

                        <div class="fw-bold" style="font-size: 60px; font-family: Arial;" id="lblTemp"></div>

                    </div>

                    <div class="col-8">

                        <div class="bi bi-brightness-high-fill" style="font-size: 50px;"></div>

                        <div id="lblDescription"></div>

                    </div>

                </div>

            </div>

            <div class="row mt-4">

               <div class="p-4  col rounded rounded-4" style="height: 200px;" id="box1">

                  <div class="bi bi-droplet-fill"> Humidity </div>
                  <div id="lblHumidity" class="fs-2 fw-bold"></div>
                  <div class="mt-3 progress">
                    <div class="progress-bar" id="progressbar">
                    </div>
                  </div>
               </div>
               <div class="mx-3 p-4 col rounded rounded-4" style="height: 200px;" id="box1">
                    <div class="bi bi-wind"> Wind Speed </div>
                    <div id="lblWindSpeed" class="fs-2 fw-bold"></div>
                    <div class="mt-3 progress">
                        <div class="progress-bar" id="windProgressbar">

                        </div>
                    </div>
               </div>
               <div class="p-4 col rounded rounded-4" style="height: 200px;" id="box1">
                    <div class="bi bi-thermometer-half"> Pressure </div>
                    <div id="lblPressure" class="fs-2 fw-bold"></div>
                    <div class="mt-3 progress">
                        <div class="progress-bar" id="PProgressbar">

                        </div>
                    </div>

               </div>

            </div>

         </div>

         <div class="col-3">

            <div class="rounded rounded-4" style="height: 350px;" id="box1">



            </div>

         </div>

     </section>

</body>


</html>
